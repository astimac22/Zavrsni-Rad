<!DOCTYPE html>
<html lang="hr">
<head>
    <title>Registracija</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">

    <h1>Registracija</h1>

    <form class="auth-form" method="POST" action="/register">

        <label for="name">Ime i prezime</label>
        <input type="text" id="name" name="name" placeholder="Ime i prezime" required>

        <label for="email">E-pošta</label>
        <input type="email" id="email" name="email" placeholder="E-pošta" required>

        <label for="password">Lozinka</label>
        <input type="password" id="password" name="password" placeholder="Lozinka" required>

        <p class="auth-error">{{error}}</p>

        <button type="submit" class="button">Registriraj se</button>

    </form>

    <p class="auth-switch">Već imate račun? <a href="/login">Prijavite se</a></p>

</div>

</body>
</html>
