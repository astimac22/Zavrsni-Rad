<!DOCTYPE html>
<html lang="hr">
<head>
    <title>Prijava</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">

    <h1>Prijava</h1>

    <form class="auth-form" method="POST" action="/login">

        <label for="email">E-pošta</label>
        <input type="email" id="email" name="email" placeholder="E-pošta" required>

        <label for="password">Lozinka</label>
        <input type="password" id="password" name="password" placeholder="Lozinka" required>

        <p class="auth-error">{{error}}</p>

        <button type="submit" class="button">Prijava</button>

    </form>

    <p class="auth-switch">Nemate račun? <a href="/register">Registrirajte se</a></p>

</div>

</body>
</html>
