<!DOCTYPE html>
<html lang="hr">
<head>
    <title>Potvrda rezervacije</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
    <a href="/">Filmovi</a>
    <a href="/reservations">Moje rezervacije</a>
    <a href="/logout">Odjava</a>
</nav>

<div class="container">

    <h1>Rezervacija uspješna!</h1>

    <div class="confirmation-card">
        <p class="confirmation-id">Rezervacija {{id}}</p>
        <p><strong>{{movieTitle}}</strong></p>
        <p>Sjedala: <strong>{{seats}}</strong></p>
        <p>Termin: <strong>{{screeningTime}}</strong></p>
        <hr class="divider">
        <p>Ime: {{name}}</p>
        <p>E-pošta: {{email}}</p>
    </div>

    <div class="confirmation-actions">
        <a class="button" href="/reservations">Moje rezervacije</a>
        <a class="button button-secondary" href="/">Povratak na filmove</a>
    </div>

</div>

</body>
</html>
